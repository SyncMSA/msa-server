server:
  port: 60000

spring:
  application:
    name: member-service
  jpa:
    hibernate:
      ddl-auto: create
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MEMBER_SPRING_DATASOURCE_URL}
    username: ${MEMBER_SPRING_DATASOURCE_USERNAME}
    password: ${MEMBER_SPRING_DATASOURCE_PASSWORD}

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
