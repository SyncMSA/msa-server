server:
  port: 8888

spring:
  application:
    name: config-service  # Eureka에 등록될 서비스 이름
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka


management:
  endpoints:
    web:
      exposure:
        include: health, busrefresh, refresh, metrics  # 관리 엔드포인트 설정