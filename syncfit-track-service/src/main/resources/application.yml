server:
  port: 30000
spring:
  application:
    name: track-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TRACK_SPRING_DATASOURCE_URL}
    username: ${TRACK_SPRING_DATASOURCE_USERNAME}
    password: ${TRACK_SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka